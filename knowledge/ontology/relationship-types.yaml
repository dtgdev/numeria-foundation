version: 1.0.0
status: CANON

relationship_types:

  LIVES_AT:
    source: Character
    target: Location

  GUIDED_BY:
    source: Character
    target: Character

  FRIEND_OF:
    source: Character
    target: Character
    symmetric: true

  CARRIES:
    source: Character
    target: Artifact

  CREATED:
    source: Character
    target: Artifact

  STORED_AT:
    source: Artifact
    target: Location

  MEMBER_OF:
    source: Character
    target: Organization

  PROTECTS:
    source: Character
    target: Artifact

  APPEARS_IN:
    source:
      - Character
      - Event
      - Artifact
      - Location
    target: Book

  LOCATED_IN:
    source: Organization
    target: Location

  REPRESENTED_BY:
    source: Concept
    target: Character

  TEACHES:
    source: LearningObjective
    target: Concept

  REQUIRES:
    source: Concept
    target: Concept
    # A Concept prerequisite chain must be a DAG -- if REQUIRES ever
    # forms a cycle, some concept would require itself to be learned
    # first. Marked in v0.15.0 so DependencyGraphValidator
    # (numeria_forge.semantics) knows to check this specific
    # relationship type for cycles.
    acyclic: true

  FEATURES_CHARACTER:
    source: Scene
    target: Character

  INTRODUCES_CONCEPT:
    source: Scene
    target: Concept

  OCCURS_AT:
    source: Scene
    target: Location

  ACHIEVES_OBJECTIVE:
    source: Scene
    target: LearningObjective

  PART_OF_BOOK:
    source: Scene
    target: Book

  USES_SCENE:
    source: Lesson
    target: Scene

  TEACHES_OBJECTIVE:
    source: Lesson
    target: LearningObjective

  TEACHES_CONCEPT:
    source: Lesson
    target: Concept

  ASSESSES_OBJECTIVE:
    source: Assessment
    target: LearningObjective

  EVALUATES_LESSON:
    source: Assessment
    target: Lesson

  ASSESSES_CONCEPT:
    source: Assessment
    target: Concept

  PART_OF_LESSON:
    source: Activity
    target: Lesson

  PRACTICES_OBJECTIVE:
    source: Activity
    target: LearningObjective

  PRACTICES_CONCEPT:
    source: Activity
    target: Concept

  STARTS_WITH_SCENE:
    source: LearningJourney
    target: Scene

  INCLUDES_LESSON:
    source: LearningJourney
    target: Lesson

  INCLUDES_ACTIVITY:
    source: LearningJourney
    target: Activity

  ENDS_WITH_ASSESSMENT:
    source: LearningJourney
    target: Assessment

  FEATURES_ARTIFACT:
    source: Scene
    target: Artifact

  FOLLOWS_SCENE:
    source: Scene
    target: Scene
