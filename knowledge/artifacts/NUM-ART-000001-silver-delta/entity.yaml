primaryPurpose: 'Reveal hidden patterns of change without explaining, predicting,
  or solving the mystery.

  '
capabilities:
- Detects meaningful patterns of change
- Becomes warm when an unexplained change is nearby
- Reveals visual relationships among observed measurements
- Responds to careful observation and curiosity
limitations:
- Does not create change
- Does not stop change
- Does not provide answers
- Does not predict the future
- Does not replace measurement or reasoning
- Cannot be commanded to activate
canonicalRules:
- Only one Silver Delta exists
- The Silver Delta chooses its Keeper
- It reveals patterns but never interpretations
- It works only when genuine change is present
- It becomes quiet when the relevant change has stopped
- It cannot solve a mystery without observation and evidence
