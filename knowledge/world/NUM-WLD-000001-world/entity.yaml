id: NUM-WLD-000001
name: Numeria
slug: world
type: World
status: CANON
version: 1.0.0

summary: >
  Numeria is a living educational universe where mathematical ideas,
  symbols, patterns, and relationships become memorable characters,
  places, stories, discoveries, and adventures.

purpose: >
  Help learners experience mathematics as an interconnected world of
  meaning rather than a collection of isolated rules and symbols.

educational_mission: >
  Make mathematics understandable, memorable, emotionally engaging,
  and joyful through storytelling, visual learning, exploration, and
  mathematically accurate world building.

