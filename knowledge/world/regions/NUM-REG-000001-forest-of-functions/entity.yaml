summary: >
  The Forest of Functions is a vast living region where inputs travel
  through mysterious paths and emerge transformed as outputs. Every
  function has its own behavior, shape, rule, and personality.

educational_mission: >
  Help learners understand functions as processes that receive inputs,
  apply rules, and produce outputs.

